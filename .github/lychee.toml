# Lychee link checker config — runs in CI on the built site.
# Docs: https://lychee.cli.rs/usage/config/

# Verbosity level
verbose = "info"

# Don't follow same-page anchors as separate links
include_fragments = false

# Treat 429 (rate limited) as ok — some sites throttle CI runners
accept = ["100..=103", "200..=299", "429"]

# Skip links that are commonly flaky in CI but valid in practice
exclude = [
  # localhost/127.0.0.1 references in code samples
  "^https?://localhost",
  "^https?://127\\.0\\.0\\.1",
  # GitHub anchor-edit URLs (we don't generate these but guard anyway)
  "^https?://github\\.com/.+/edit/",
  # Mailto and tel
  "^mailto:",
  "^tel:",
  # LinkedIn returns HTTP 999 to non-browser user agents as a bot deterrent;
  # the URL itself is fine, but CI cannot distinguish 999 from a real failure.
  "^https?://(www\\.)?linkedin\\.com/",
  # Self-canonicals to clawdemy.org point at production. New lessons land on
  # `dev` first and only reach prod after a main merge, so on the first dev
  # push the canonical 404s. We already verify the same pages locally via
  # file:// when lychee crawls the built dist; checking the production URL
  # adds nothing but a deploy-order race.
  "^https?://clawdemy\\.org/",
  # Stanford's CME 295 course site rejects CI user-agents with 403 (likely a
  # WAF / bot deterrent). The URL itself is valid and is the canonical Stanford
  # citation for the AI Foundations track; CI cannot distinguish a WAF 403
  # from a real broken link.
  "^https?://cme295\\.stanford\\.edu/",
]

# Network politeness
max_concurrency = 8
timeout = 20
retry_wait_time = 2
max_retries = 2

# User agent so sites don't think we're a malicious crawler
user_agent = "Mozilla/5.0 (compatible; Clawdemy-CI-LinkCheck/1.0; +https://clawdemy.org)"

# Cache results across runs to speed up CI
cache = true
max_cache_age = "24h"
