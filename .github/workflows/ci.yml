name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-validate:
    name: Build, typecheck, validate content
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node is required by `astro check`, `astro build`, and `astro preview`,
      # which Bun-run scripts shell out to. Astro requires Node >=22.12.
      # Version pinned in .nvmrc for one source of truth.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Validate content schema
        run: bun run validate:content

      - name: Validate attribution blocks
        run: bun run validate:attribution

      - name: Build site (includes Pagefind index)
        run: bun run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  link-check:
    name: Check links in built site
    runs-on: ubuntu-latest
    needs: build-and-validate
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # --root-dir is required so lychee can resolve root-relative links
          # (href="/", href="/mission/") in built HTML against the local dist
          # tree instead of treating them as unresolvable.
          args: >-
            --config .github/lychee.toml
            --root-dir "$GITHUB_WORKSPACE/dist"
            --no-progress
            './dist/**/*.html'
          fail: true

  e2e:
    name: Playwright e2e tests
    runs-on: ubuntu-latest
    needs: build-and-validate
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node is required by `astro preview` (started by the Playwright config
      # before tests run). Astro requires Node >=22.12.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Reuse the artifact built by build-and-validate so astro preview has
      # something to serve. Avoids rebuilding twice in CI.
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Install Playwright browsers
        run: bun run test:e2e:install

      - name: Run e2e tests
        run: bun run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: playwright-report/
          retention-days: 7
